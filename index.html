<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Sisa Buku</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background-color: #141414;
      color: white;
    }
    .book-row {
      overflow-x: auto;
      white-space: nowrap;
    }
    .book-card {
      display: inline-block;
      width: 150px;
      margin-right: 10px;
    }
    .book-card img {
      width: 100%;
      border-radius: 10px;
    }
  </style>
</head>

<body>

<div class="container mt-4">
  <h1>📚 Sisa Buku</h1>
  <p>Buku murah, siap dibaca</p>

  <h3>Novel Populer</h3>
  <div class="book-row">

    <div class="book-card">
      <img src="https://via.placeholder.com/150x200">
      <p>Rp20.000</p>
    </div>

    <div class="book-card">
      <img src="https://via.placeholder.com/150x200">
      <p>Rp15.000</p>
    </div>

  </div>

</div>

</body>
</html>
